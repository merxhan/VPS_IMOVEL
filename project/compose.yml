name: inmovel

services:
  db:
    image: postgres:16-alpine
    container_name: inmovel-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: ${POSTGRES_TZ}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT}:5432"
    networks:
      - inmovel-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: inmovel-backend
    volumes:
      - uploads-data:/app/uploads
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3000
      TZ: ${POSTGRES_TZ}
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    networks:
      - inmovel-net
    ports:
      - "3001:3000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: inmovel-frontend
    environment:
      VITE_API_URL: /api
      NODE_ENV: production
    depends_on:
      - backend
    networks:
      - inmovel-net
    ports:
      - "8081:5173"

volumes:
  postgres-data:
  uploads-data:

networks:
  inmovel-net:
    name: inmovel-net

