name: inmovel

services:
  db:
    image: postgres:16-alpine
    container_name: inmovel_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: ${POSTGRES_TZ}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT}:5432"
    networks:
      - inmovel-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: inmovel_backend
    container_name: inmovel_backend
    volumes:
      - uploads-data:/app/uploads
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3000
      TZ: ${POSTGRES_TZ}
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    networks:
      - inmovel-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: inmovel_frontend
    container_name: inmovel_frontend
    environment:
      VITE_API_URL: /api
      NODE_ENV: production
    depends_on:
      - backend
    ports:
      - "8081:5173"
    networks:
      - inmovel-net
      - proxy_network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy_network"
      - "traefik.http.routers.inmovel-frontend.rule=Host(`${TRAEFIK_SUBDOMAIN}.${TRAEFIK_DOMAIN}`)"
      - "traefik.http.routers.inmovel-frontend.entrypoints=${TRAEFIK_ENTRYPOINT}"
      - "traefik.http.routers.inmovel-frontend.tls=true"
      - "traefik.http.routers.inmovel-frontend.tls.certresolver=${TRAEFIK_CERT_RESOLVER}"
      - "traefik.http.services.inmovel-frontend.loadbalancer.server.port=5173"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres-data:
  uploads-data:

networks:
  inmovel-net:
    name: inmovel-net
  proxy_network:
    external: true